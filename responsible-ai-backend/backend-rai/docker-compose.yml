services:
  backend:
    container_name: responsible-ai-backend
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    working_dir: /app/src
    command: ["python3", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "30019", "--reload"]
    environment:
      DB_TYPE: mongo
      DB_NAME: raibackend
      MONGO_PATH: mongodb://mongo:27017/
      SECRET_KEY: your_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      TOKEN_URL: /token
      TELEMETRY_FLAG: "False"
      allow_origin: '["*"]'
      allow_methods: GET, POST, OPTIONS, HEAD, DELETE, PATCH, UPDATE
    volumes:
      - .:/app
    ports:
      - "30019:30019"

  mongo:
    container_name: responsible-ai-backend-mongo
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: raibackend
    ports:
      - "27017:27017"
    volumes:
      - backend_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  backend_mongo_data:
