services:
  admin:
    container_name: responsible-ai-admin
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    working_dir: /app/src
    command: ["python3", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "30016", "--reload"]
    environment:
      DB_TYPE: mongo
      DB_NAME: RAI_Admin_DB
      MONGO_PATH: mongodb://mongo:27017/
      allow_origin: '["*"]'
      allow_method: GET, POST, OPTIONS, HEAD, DELETE, PATCH, UPDATE
    volumes:
      - .:/app
    ports:
      - "30016:30016"

  mongo:
    container_name: responsible-ai-admin-mongo
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: RAI_Admin_DB
    ports:
      - "27017:27017"
    volumes:
      - admin_mongo_data:/data/db
      - ../Initial DB setup:/seed:ro
      - ./mongo-init/import-data.sh:/docker-entrypoint-initdb.d/import-data.sh:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  admin_mongo_data:
